{{- $page := . -}}
{{- $password := default "" $page.Params.password -}}
{{- $passwordHash := default "" $page.Params.passwordHash -}}
{{- $isPrivateArticle := and $page.Params.private (or $password $passwordHash) -}}
{{- if $isPrivateArticle -}}
    <span class="article-private-badge">加密文章</span>
{{- end -}}
